<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd One Out · Let's Go Shopping!</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff5f0;
  --bg2:#ffe8d6;
  --card:#ffffff;
  --orange:#ff5500;
  --orange2:#ff8800;
  --orange-pale:#fff0e6;
  --pink:#ff2d78;
  --pink-pale:#ffe0ee;
  --yellow:#ffcc00;
  --green:#00b86b;
  --green-pale:#d4f7e8;
  --red:#ff2244;
  --red-pale:#ffe0e5;
  --teal:#00cccc;
  --teal-pale:#d4f8f8;
  --purple:#9b30ff;
  --purple-pale:#f0e0ff;
  --text:#1a0505;
  --text2:#883322;
  --muted:#cc8866;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);font-family:'Lexend',sans-serif;color:var(--text);
  min-height:100vh;padding:1rem 1rem 3rem;
  background-image:
    radial-gradient(circle at 8% 15%,rgba(255,85,0,.12) 0%,transparent 45%),
    radial-gradient(circle at 92% 85%,rgba(255,45,120,.1) 0%,transparent 45%),
    radial-gradient(circle at 50% 50%,rgba(255,204,0,.06) 0%,transparent 60%);
}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:1.1rem;}
.pill{display:inline-block;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-size:.65rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:.3rem 1rem;border-radius:999px;margin-bottom:.55rem;box-shadow:0 4px 16px rgba(255,85,0,.3);}
h1{font-size:clamp(1.5rem,4vw,2.1rem);font-weight:800;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h1 span{background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:.86rem;color:var(--text2);margin-top:.2rem;}
.ccf{display:inline-flex;align-items:center;gap:.25rem;background:var(--purple);color:#fff;font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.18rem .65rem;border-radius:999px;margin-left:.35rem;vertical-align:middle;}

/* ── LEVEL ── */
.lvlbar{display:flex;gap:.6rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.lvlbtn{padding:.48rem 1.25rem;border-radius:999px;border:2.5px solid var(--orange2);background:#fff;color:var(--orange);font-family:'Lexend',sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;transition:all .2s;}
.lvlbtn.on{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border-color:var(--orange);box-shadow:0 4px 16px rgba(255,85,0,.3);transform:translateY(-1px);}
.lvlbtn:hover:not(.on){background:var(--orange-pale);}

/* ── STATS ── */
.stats{display:flex;justify-content:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;}
.chip{background:#fff;border:2.5px solid var(--bg2);border-radius:999px;padding:.28rem .85rem;font-size:.8rem;font-weight:700;color:var(--text2);box-shadow:0 2px 8px rgba(255,85,0,.08);}
.lives{display:flex;gap:3px;align-items:center;}
.life{font-size:.95rem;transition:all .3s;}
.life.lost{opacity:.15;filter:grayscale(1);}

/* ── A1 HELPER ── */
.helper{display:none;background:rgba(0,204,204,.1);border:2px solid var(--teal);border-radius:13px;padding:.65rem 1rem;margin-bottom:1rem;max-width:680px;margin-left:auto;margin-right:auto;font-size:.83rem;color:#005a5a;font-weight:700;text-align:center;}
body.a1 .helper{display:block;}

/* ── GAME CARD ── */
.gcard{background:var(--card);border-radius:22px;padding:1.5rem 1.5rem 1.7rem;box-shadow:0 8px 36px rgba(255,85,0,.13);border:2.5px solid var(--bg2);max-width:660px;margin:0 auto;}

/* ── PROGRESS ── */
.prow{display:flex;align-items:center;gap:.7rem;margin-bottom:1.2rem;}
.plbl{font-size:.75rem;font-weight:700;color:var(--text2);white-space:nowrap;}
.pbar-wrap{flex:1;background:var(--orange-pale);border-radius:999px;height:9px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange),var(--pink));border-radius:999px;transition:width .5s ease;box-shadow:0 0 8px rgba(255,85,0,.3);}
.sbadge{background:var(--orange-pale);color:var(--orange);font-size:.75rem;font-weight:700;padding:.22rem .75rem;border-radius:999px;white-space:nowrap;border:1.5px solid var(--orange2);}

/* ── CATEGORY CHIP ── */
.ccat{display:inline-flex;align-items:center;gap:.45rem;border-radius:12px;padding:.42rem 1rem;font-size:.83rem;font-weight:700;margin-bottom:1rem;border:2.5px solid;transition:all .3s;}

/* ── QUESTION ── */
.qlbl{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.qtxt{font-size:1.02rem;font-weight:700;color:var(--text);margin-bottom:1.2rem;line-height:1.5;}
body.a1 .qtxt{font-size:.94rem;}

/* ── WORD CARDS ── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.1rem;}
.wcard{
  background:var(--orange-pale);border:2.5px solid #ffd0b0;border-radius:16px;
  padding:1rem .8rem;text-align:center;cursor:pointer;
  transition:transform .18s,box-shadow .18s,background .18s,border-color .18s;
  user-select:none;
}
.wcard:hover:not(.disabled){transform:translateY(-4px);box-shadow:0 8px 22px rgba(255,85,0,.18);border-color:var(--orange);}
.wcard:active:not(.disabled){transform:scale(.96);}
.wcard.disabled{cursor:default;}
.wem{font-size:2rem;display:block;margin-bottom:.35rem;line-height:1;}
.wen{font-size:1.05rem;font-weight:800;color:var(--orange);transition:color .2s;}
.wfr{font-size:.74rem;color:var(--text2);font-weight:500;margin-top:.1rem;display:none;}
body.a1 .wfr{display:block;}

/* answer states */
.wcard.correct{background:var(--green-pale);border-color:var(--green);animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);}
.wcard.correct .wen{color:var(--green);}
.wcard.wrong{background:var(--red-pale);border-color:var(--red);animation:shake .35s ease;}
.wcard.wrong .wen{color:var(--red);}
.wcard.reveal{background:var(--green-pale);border-color:var(--green);opacity:.65;}
.wcard.reveal .wen{color:var(--green);}

@keyframes popIn{0%{transform:scale(.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* ── EXPLANATION ── */
.expl{min-height:2.2rem;border-radius:12px;padding:.65rem 1rem;font-size:.86rem;font-weight:600;margin-bottom:1rem;line-height:1.5;opacity:0;transition:opacity .35s;border:2px solid transparent;}
.expl.show{opacity:1;}
.expl.ok{background:var(--green-pale);color:#085a30;border-color:var(--green);}
.expl.err{background:var(--red-pale);color:#8a0a1a;border-color:var(--red);}

/* ── NEXT BTN ── */
.btn-next{display:none;padding:.58rem 1.7rem;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:999px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,85,0,.3);transition:all .2s;margin:0 auto;}
.btn-next.show{display:block;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,85,0,.4);}

/* ── END SCREEN ── */
.end{display:none;text-align:center;padding:1.5rem .5rem;}
.end.show{display:block;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;}
.end-em{font-size:3.2rem;margin-bottom:.4rem;}
.end-title{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.2rem;}
.end-score{font-size:2.2rem;font-weight:800;color:var(--orange);margin:.5rem 0;}
.end-sub{font-size:.9rem;color:var(--text2);margin-bottom:1rem;}
.end-medals{display:flex;justify-content:center;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.medal{background:var(--orange-pale);border:2px solid var(--orange2);border-radius:12px;padding:.38rem .85rem;font-size:.78rem;font-weight:700;color:var(--orange);}
.btn-again{padding:.62rem 1.8rem;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:999px;font-family:'Lexend',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(255,85,0,.35);transition:all .2s;}
.btn-again:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,85,0,.45);}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);color:#fff;padding:.62rem 1.5rem;border-radius:999px;font-weight:700;font-size:.9rem;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:linear-gradient(135deg,var(--green),#00d980);box-shadow:0 4px 18px rgba(0,184,107,.4);}
.toast.err{background:linear-gradient(135deg,var(--red),#ff6680);box-shadow:0 4px 18px rgba(255,34,68,.4);}
</style>
</head>
<body class="a1">
<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="pill">🛍️ Unit 3 · Let's Go Shopping</div>
  <h1>🔍 Odd <span>One Out</span></h1>
  <p class="sub">Find the word that doesn't belong! <span class="ccf">🎯 CCF Prep</span></p>
</div>

<div class="lvlbar">
  <button class="lvlbtn on" id="ba1" onclick="setLevel('a1')">🟢 A1 Starter <small style="font-weight:400;font-size:.73rem"> · avec aide</small></button>
  <button class="lvlbtn" id="ba2" onclick="setLevel('a2')">🟡 A2 Challenge <small style="font-weight:400;font-size:.73rem"> · sans aide</small></button>
</div>

<div class="helper">💡 <strong>How to play:</strong> Look at the 4 words — <strong>3 belong to the same category</strong>, 1 does not. Click the odd one out!</div>

<div class="stats">
  <div class="chip">⏱ <span id="tmr">00:00</span></div>
  <div class="chip">❤️ <div class="lives" id="lives"></div></div>
  <div class="chip">🎯 <span id="qctr">1 / 1</span></div>
</div>

<div class="gcard" id="gcard">
  <div class="prow" id="prow">
    <span class="plbl" id="plbl">Q 1</span>
    <div class="pbar-wrap"><div class="pbar-fill" id="pbar"></div></div>
    <span class="sbadge">Score: <span id="sval">0</span></span>
  </div>

  <div class="ccat" id="ccat">🏷️ Category</div>
  <div class="qlbl">Which word doesn't belong?</div>
  <div class="qtxt" id="qtxt"></div>
  <div class="cgrid" id="cgrid"></div>
  <div class="expl" id="expl"></div>
  <button class="btn-next" id="btn-next" onclick="nextQ()">Next question →</button>

  <div class="end" id="end">
    <div class="end-em" id="end-em">🎉</div>
    <div class="end-title" id="end-title">Brilliant!</div>
    <div class="end-score" id="end-score"></div>
    <div class="end-sub" id="end-sub"></div>
    <div class="end-medals" id="end-medals"></div>
    <button class="btn-again" onclick="startGame()">🔄 Play Again</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// POOL — Unit 3 Shopping · CAP level
// ══════════════════════════════════════════════
const POOL = [

  // ── CLOTHES ──
  {
    cat:'👗 Clothes', cc:'#fff0fb', cb:'#ff80cc', ct:'#6b0044',
    q_a1:'Which word is NOT a piece of clothing?',
    q_a2:'Spot the odd one out — clothing category.',
    words:[
      {en:'HOODIE',   em:'🧥', fr:'sweat à capuche'},
      {en:'TRAINERS', em:'👟', fr:'baskets'},
      {en:'RECEIPT',  em:'🧾', fr:'reçu'},
      {en:'JOGGERS',  em:'👖', fr:'jogging'},
    ],
    odd:2,
    ex_a1:'"Receipt" (reçu) is NOT clothing — it\'s a document you get after paying. HOODIE, TRAINERS and JOGGERS are all clothes!',
    ex_a2:'"Receipt" is a payment document, not an item of clothing.',
    lv:'a1'
  },
  {
    cat:'👗 Clothes', cc:'#fff0fb', cb:'#ff80cc', ct:'#6b0044',
    q_a1:'Which word is NOT a piece of clothing?',
    q_a2:'Find the word that does not belong.',
    words:[
      {en:'TRACKSUIT', em:'🏃', fr:'survêtement'},
      {en:'BELT',      em:'👔', fr:'ceinture'},
      {en:'BARBER',    em:'✂️', fr:'coiffeur'},
      {en:'BEANIE',    em:'🧢', fr:'bonnet'},
    ],
    odd:2,
    ex_a1:'"Barber" (coiffeur) is a person — not clothing! TRACKSUIT, BELT and BEANIE are all things you wear.',
    ex_a2:'"Barber" is a profession. The others are all garments or accessories.',
    lv:'a1'
  },
  {
    cat:'👗 Clothes', cc:'#fff0fb', cb:'#ff80cc', ct:'#6b0044',
    q_a1:'Three words are clothes. Which one is NOT?',
    q_a2:'Which word does not belong in the clothes group?',
    words:[
      {en:'SWEATSHIRT', em:'👕', fr:'sweat-shirt'},
      {en:'DISCOUNT',   em:'🔖', fr:'réduction'},
      {en:'TROUSERS',   em:'👖', fr:'pantalon'},
      {en:'JACKET',     em:'🧥', fr:'veste'},
    ],
    odd:1,
    ex_a1:'"Discount" (réduction) is about money — not clothing! SWEATSHIRT, TROUSERS and JACKET are all garments.',

    lv:'a1'

  {
    cat:'👗 Clothes', cc:'#fff0fb', cb:'#ff80cc', ct:'#6b0044',
    q_a1:'Find the word that is NOT clothing.',
    q_a2:'Which word is the odd one out?',
    words:[
      {en:'SNAPBACK',   em:'🧢', fr:'casquette'},
      {en:'SUNGLASSES', em:'🕶️', fr:'lunettes de soleil'},
      {en:'CHECKOUT',   em:'🛒', fr:'caisse'},
      {en:'SOCKS',      em:'🧦', fr:'chaussettes'},
    ],
    odd:2,
    ex_a1:'"Checkout" (caisse) is where you pay — not something you wear! SNAPBACK, SUNGLASSES and SOCKS are all accessories.',
    ex_a2:'"Checkout" is part of the shop layout. The others are all fashion accessories.',
    lv:'a1'
  },

  // ── PAYMENT ──
  {
    cat:'💳 Payment', cc:'#f0fff4', cb:'#00cc66', ct:'#003322',
    q_a1:'Which word is NOT about paying?',
    q_a2:'Find the odd one out in the payment category.',
    words:[
      {en:'CASH',    em:'💵', fr:'espèces'},
      {en:'REFUND',  em:'↩️', fr:'remboursement'},
      {en:'POUND',   em:'💷', fr:'livre sterling'},
      {en:'FITTING', em:'🪞', fr:'essayage'},
    ],
    odd:3,
    ex_a1:'"Fitting" (essayage) is what you do in a changing room — not about money! CASH, REFUND and POUND are all payment words.',
    ex_a2:'"Fitting" relates to trying on clothes. The others all belong to the payment/money category.',
    lv:'a1'
  },
  {
    cat:'💳 Payment', cc:'#f0fff4', cb:'#00cc66', ct:'#003322',
    q_a1:'Which word does NOT relate to money or payment?',
    q_a2:'Spot the intruder in this payment set.',
    words:[
      {en:'PRICE',   em:'🏷️', fr:'prix'},
      {en:'CHANGE',  em:'🪙', fr:'monnaie'},
      {en:'LOOSE',   em:'💨', fr:'ample'},
      {en:'RECEIPT', em:'🧾', fr:'reçu'},
    ],
    odd:2,
    ex_a1:'"Loose" (ample) describes how clothing fits — nothing to do with money! PRICE, CHANGE and RECEIPT are all payment words.',
    ex_a2:'"Loose" is an adjective describing fit. The others all belong to the payment lexical field.',
    lv:'a1'
  },
  {
    cat:'💳 Payment', cc:'#f0fff4', cb:'#00cc66', ct:'#003322',
    q_a1:'Three words are about money. Which is NOT?',
    q_a2:'Find the word that doesn\'t fit the payment theme.',
    words:[
      {en:'DISCOUNT',  em:'🔖', fr:'réduction'},
      {en:'BUDGET',    em:'💰', fr:'budget'},
      {en:'TOPPING',   em:'🍫', fr:'nappage'},
      {en:'EXPENSIVE', em:'💎', fr:'cher'},
    ],
    odd:2,
    ex_a1:'"Topping" (nappage) is something you put on ice cream — not a money word! DISCOUNT, BUDGET and EXPENSIVE are all about prices.',
    ex_a2:'"Topping" belongs to the food/ice cream set. The others all relate to prices and money.',
    lv:'a1'
  },

  // ── FIT & SIZE ──
  {
    cat:'📐 Fit & Size', cc:'#fffbe0', cb:'#ffcc00', ct:'#5a3d00',
    q_a1:'Which word does NOT describe how clothes fit?',
    q_a2:'Find the word that doesn\'t describe fit or size.',

      {en:'CASH',    em:'💵', fr:'espèces'},

    odd:2,
    ex_a1:'"Cash" (espèces) is money — it doesn\'t describe how clothes fit! TIGHT, LOOSE and PERFECT all describe clothing fit.',
    ex_a2:'"Cash" belongs to the payment category. The others are adjectives describing how a garment fits.',
    lv:'a1'
  },
  {
    cat:'📐 Fit & Size', cc:'#fffbe0', cb:'#ffcc00', ct:'#5a3d00',
    q_a1:'Which word is NOT about how clothes fit or feel?',
    q_a2:'Spot the odd one out — fit and size category.',
    words:[
      {en:'SOFT',    em:'🌸', fr:'doux'},
      {en:'HARD',    em:'🪨', fr:'dur'},
      {en:'MASSIVE', em:'🐘', fr:'énorme'},
      {en:'EARBUDS', em:'🎧', fr:'écouteurs'},
    ],
    odd:3,
    ex_a1:'"Earbuds" (écouteurs) are tech accessories — not words about fit! SOFT, HARD and MASSIVE can all describe clothing.',
    ex_a2:'"Earbuds" are electronic accessories. The others are all adjectives describing physical qualities.',
    lv:'a1'

  // ── ICE CREAM / FOOD ──

    cat:'🍦 Ice Cream & Food', cc:'#fff5e6', cb:'#ff8800', ct:'#5a2200',

      {en:'FLAVOUR', em:'✨', fr:'parfum'},
      {en:'SCOOP',   em:'🍨', fr:'boule'},
      {en:'TOPPING', em:'🍫', fr:'nappage'},
      {en:'SECTION', em:'🗂️', fr:'rayon'},
    ],
    odd:3,
    ex_a1:'"Section" (rayon) is part of a shop — not ice cream! FLAVOUR, SCOOP and TOPPING are all ice cream words.',
    ex_a2:'"Section" refers to an area of a shop. The others all belong to the ice cream lexical set.',
    lv:'a1'
  },
  {
    cat:'🍦 Ice Cream & Food', cc:'#fff5e6', cb:'#ff8800', ct:'#5a2200',
    q_a1:'Which word is NOT related to ice cream?',
    q_a2:'Spot the odd one out in the ice cream category.',
    words:[
      {en:'CONE',    em:'🍦', fr:'cornet'},
      {en:'VANILLA', em:'🌿', fr:'vanille'},

      {en:'SCOOP',   em:'🍨', fr:'boule'},

    odd:2,
    ex_a1:'"Barber" (coiffeur) cuts hair — nothing to do with ice cream! CONE, VANILLA and SCOOP are all ice cream words.',

  },
  {
    cat:'🍦 Ice Cream & Food', cc:'#fff5e6', cb:'#ff8800', ct:'#5a2200',
    q_a1:'Which word does NOT belong with ice cream?',
    q_a2:'Find the odd one out in this food set.',
    words:[
      {en:'CHOCOLATE', em:'🍫', fr:'chocolat'},
      {en:'SWEET',     em:'🍬', fr:'sucré'},
      {en:'CHECKOUT',  em:'🛒', fr:'caisse'},
      {en:'CUP',       em:'🥤', fr:'pot'},

    ex_a1:'"Checkout" (caisse) is where you pay at a shop — nothing to do with food! CHOCOLATE, SWEET and CUP are all ice cream related.',

  },

  // ── SHOP & PLACE ──
  {
    cat:'🏪 Shop & Place', cc:'#e6fff5', cb:'#00cc88', ct:'#003322',
    q_a1:'Which word is NOT about a shop or place?',
    q_a2:'Find the odd one out — shop vocabulary.',
    words:[
      {en:'CHECKOUT', em:'🛒', fr:'caisse'},
      {en:'SECTION',  em:'🗂️', fr:'rayon'},
      {en:'TIGHT',    em:'🤏', fr:'serré'},
      {en:'SOUVENIR', em:'🗽', fr:'souvenir'},
    ],
    odd:2,
    ex_a1:'"Tight" (serré) describes how clothes fit — not a place! CHECKOUT, SECTION and SOUVENIR are all shop-related words.',
    ex_a2:'"Tight" is an adjective describing fit. The others all relate to places or items in a shop.',
    lv:'a1'
  },
  {
    cat:'🏪 Shop & Place', cc:'#e6fff5', cb:'#00cc88', ct:'#003322',
    q_a1:'Which word does NOT relate to a shop?',
    q_a2:'Find the word that doesn\'t describe a shop concept.',
    words:[
      {en:'CHECKOUT',  em:'🛒', fr:'caisse'},
      {en:'SECTION',   em:'🗂️', fr:'rayon'},
      {en:'MASSIVE',   em:'🐘', fr:'énorme'},
      {en:'SOUVENIR',  em:'🗽', fr:'souvenir'},
    ],
    odd:2,
    ex_a1:'"Massive" (énorme) is a size adjective — not a shop word! CHECKOUT, SECTION and SOUVENIR are all related to shops.',
    ex_a2:'"Massive" is a size adjective. The others all relate to retail spaces and shopping.',
    lv:'a1'
  },

  // ── SHOP ACTIONS ──
  {
    cat:'🛒 Shop Actions', cc:'#f5e6ff', cb:'#9b30ff', ct:'#3d0077',
    q_a1:'Which word is NOT an action you do in a shop?',
    q_a2:'Find the odd one out — things you do in a shop.',
    words:[
      {en:'LOOKING', em:'👀', fr:'regarder'},
      {en:'TRYING',  em:'🤞', fr:'essayer'},
      {en:'FITTING', em:'🪞', fr:'essayage'},
      {en:'POUND',   em:'💷', fr:'livre sterling'},
    ],
    odd:3,
    ex_a1:'"Pound" (livre sterling) is British money — not an action! LOOKING, TRYING and FITTING are all things you do when shopping.',
    ex_a2:'"Pound" is a unit of currency. The others all describe processes involved in shopping.',
    lv:'a1'
  },

  // ── TECH & ACCESSORIES ──
  {
    cat:'📱 Tech & Accessories', cc:'#e6f0ff', cb:'#3366ff', ct:'#001155',
    q_a1:'Which word is NOT a tech accessory?',
    q_a2:'Find the odd one out — tech accessories.',
    words:[
      {en:'EARBUDS',  em:'🎧', fr:'écouteurs'},
      {en:'CHARGER',  em:'🔌', fr:'chargeur'},
      {en:'CONSOLE',  em:'🎮', fr:'console'},
      {en:'REFUND',   em:'↩️', fr:'remboursement'},
    ],
    odd:3,
    ex_a1:'"Refund" (remboursement) is about getting money back — not a gadget! EARBUDS, CHARGER and CONSOLE are all tech products.',
    ex_a2:'"Refund" is a payment concept. The others are all technology-related items.',
    lv:'a2'
  },
  {
    cat:'📱 Tech & Accessories', cc:'#e6f0ff', cb:'#3366ff', ct:'#001155',
    q_a1:'Three words are tech or accessories. Which is NOT?',
    q_a2:'Which word doesn\'t belong to the tech group?',
    words:[
      {en:'CHARGER',  em:'🔌', fr:'chargeur'},
      {en:'SNAPBACK', em:'🧢', fr:'casquette'},
      {en:'EARBUDS',  em:'🎧', fr:'écouteurs'},
      {en:'CONSOLE',  em:'🎮', fr:'console'},
    ],
    odd:1,
    ex_a1:'"Snapback" (casquette) is a fashion item — not a tech gadget! CHARGER, EARBUDS and CONSOLE are all technology.',
    ex_a2:'"Snapback" is a clothing accessory. The others are all electronic products.',
    lv:'a2'
  },
];

// ── CONFIG ──
const PICK = 10;
const MAX_LIVES = 3;
const KB_ROWS=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];

let level='a1', queue=[], qIdx=0, score=0, lives=MAX_LIVES;
let answered=false, tInt=null, secs=0, streak=0, wrongs=0;

// ── SOUNDS ──
const AC=new(window.AudioContext||window.webkitAudioContext)();
document.addEventListener('pointerdown',()=>{if(AC.state==='suspended')AC.resume();},{once:true});

function playCorrect(){
  const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type='sine';
  o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(900,t+.12);o.frequency.exponentialRampToValueAtTime(700,t+.22);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.4,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.35);
  o.start(t);o.stop(t+.36);
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.connect(g2);g2.connect(AC.destination);o2.type='triangle';
  o2.frequency.setValueAtTime(1400,t+.1);o2.frequency.exponentialRampToValueAtTime(1800,t+.2);
  g2.gain.setValueAtTime(0,t+.1);g2.gain.linearRampToValueAtTime(.18,t+.13);g2.gain.exponentialRampToValueAtTime(.001,t+.28);
  o2.start(t+.1);o2.stop(t+.3);
}
function playWrong(){
  const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(100,t+.35);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.28,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.42);
  o.start(t);o.stop(t+.44);
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.connect(g2);g2.connect(AC.destination);o2.type='square';o2.frequency.value=55;
  g2.gain.setValueAtTime(.12,t+.05);g2.gain.exponentialRampToValueAtTime(.001,t+.35);
  o2.start(t+.05);o2.stop(t+.36);
}
function playWin(){
  [523,659,784,1047,1319].forEach((freq,i)=>{
    const t=AC.currentTime+i*.09;
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.28,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.33);
    o.start(t);o.stop(t+.35);
  });
  [1047,1319,1568].forEach((freq,i)=>{
    const t=AC.currentTime+.5+i*.05;
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
    o.start(t);o.stop(t+.52);
  });
}

// ── UTILS ──
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── START ──
function startGame(){
  // A1: only a1-level questions (13 available → more than enough for 10 picks + variety)
  // A2: full pool (16 questions)
  const pool=level==='a1'?POOL.filter(q=>q.lv==='a1'):POOL;
  queue=shuffle(pool).slice(0,Math.min(PICK,pool.length));
  qIdx=0;score=0;lives=MAX_LIVES;secs=0;streak=0;wrongs=0;answered=false;
  clearInterval(tInt);
  tInt=setInterval(()=>{
    secs++;
    const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');
    document.getElementById('tmr').textContent=`${m}:${s}`;
  },1000);
  document.getElementById('end').classList.remove('show');
  showUI(true);
  renderLives();
  loadQ();
}

function showUI(show){
  ['prow','ccat','qlbl','qtxt','cgrid','expl'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display=show?'':'none';
  });
  document.getElementById('prow')&&(document.getElementById('prow').style.display=show?'flex':'none');
}

function renderLives(){
  const el=document.getElementById('lives');el.innerHTML='';
  for(let i=0;i<MAX_LIVES;i++){
    const sp=document.createElement('span');
    sp.className='life'+(i>=lives?' lost':'');
    sp.textContent='❤️';el.appendChild(sp);
  }
}

// ── LOAD QUESTION ──
function loadQ(){
  if(qIdx>=queue.length){showEnd();return;}
  const q=queue[qIdx];
  answered=false;

  document.getElementById('plbl').textContent=`Q ${qIdx+1}`;
  document.getElementById('qctr').textContent=`${qIdx+1} / ${queue.length}`;
  document.getElementById('pbar').style.width=`${(qIdx/queue.length)*100}%`;
  document.getElementById('sval').textContent=score;

  const cc=document.getElementById('ccat');
  cc.textContent=q.cat;cc.style.background=q.cc;cc.style.borderColor=q.cb;cc.style.color=q.ct;

  document.getElementById('qtxt').textContent=level==='a1'?q.q_a1:q.q_a2;

  const expl=document.getElementById('expl');
  expl.textContent='';expl.className='expl';

  document.getElementById('btn-next').classList.remove('show');
  renderCards(q);
}

function renderCards(q){
  const grid=document.getElementById('cgrid');grid.innerHTML='';
  shuffle([0,1,2,3]).forEach(i=>{
    const w=q.words[i];
    const card=document.createElement('div');
    card.className='wcard';card.dataset.idx=i;
    card.innerHTML=`<span class="wem">${w.em}</span><div class="wen">${w.en}</div><div class="wfr">${w.fr}</div>`;
    card.addEventListener('click',()=>onPick(i,q));
    grid.appendChild(card);
  });
}

// ── ANSWER ──
function onPick(idx,q){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.wcard').forEach(c=>c.classList.add('disabled'));

  if(idx===q.odd){
    playCorrect();streak++;
    const pts=2+(streak>=3?1:0);
    score+=pts;
    document.getElementById('sval').textContent=score;
    document.querySelectorAll('.wcard').forEach(c=>{
      if(+c.dataset.idx===idx)c.classList.add('correct');
    });
    showExpl(level==='a1'?q.ex_a1:q.ex_a2,'ok');
    showToast('✅ Well spotted!','ok');
  } else {
    playWrong();streak=0;wrongs++;lives--;
    renderLives();
    document.querySelectorAll('.wcard').forEach(c=>{
      if(+c.dataset.idx===idx)c.classList.add('wrong');
      if(+c.dataset.idx===q.odd)c.classList.add('reveal');
    });
    showExpl(level==='a1'?q.ex_a1:q.ex_a2,'err');
    showToast('❌ Not quite…','err');
    // If all lives gone, restore 1 silently but show a message
    if(lives<=0){
      setTimeout(()=>{lives=1;renderLives();},600);
    }
  }

  setTimeout(()=>{
    const nb=document.getElementById('btn-next');
    nb.classList.add('show');
    nb.textContent=qIdx<queue.length-1?'Next question →':'See my results 🏆';
  },900);
}

function showExpl(txt,type){
  const el=document.getElementById('expl');
  el.textContent=(type==='ok'?'✅ ':'❌ ')+txt;
  el.className=`expl ${type} show`;
}

function nextQ(){
  qIdx++;
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('expl').className='expl';
  loadQ();
}

// ── END ──
function showEnd(){
  clearInterval(tInt);
  showUI(false);
  document.getElementById('btn-next').classList.remove('show');

  const total=queue.length*2;
  const pct=Math.round((score/total)*100);
  const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');

  let em='🎉',title='Excellent work!';
  if(pct<40){em='💪';title='Keep practising!';}
  else if(pct<65){em='👍';title='Good effort!';}
  else if(pct<85){em='⭐';title='Well done!';}

  document.getElementById('end-em').textContent=em;
  document.getElementById('end-title').textContent=title;
  document.getElementById('end-score').textContent=`${score} / ${total} pts`;
  document.getElementById('end-sub').textContent=`${queue.length} questions · ${m}:${s} · ${pct}%`;

  const medals=[];
  if(wrongs===0)medals.push('🏅 Perfect round!');
  if(streak>=4)medals.push('🔥 4+ streak!');
  if(pct>=80)medals.push('⭐ High scorer');
  if(secs<90)medals.push('⚡ Speed demon');
  document.getElementById('end-medals').innerHTML=medals.map(m=>`<span class="medal">${m}</span>`).join('');

  document.getElementById('end').classList.add('show');
  playWin();
}

// ── LEVEL / TOAST ──
function setLevel(lv){
  level=lv;
  document.getElementById('ba1').classList.toggle('on',lv==='a1');
  document.getElementById('ba2').classList.toggle('on',lv==='a2');
  document.body.classList.toggle('a1',lv==='a1');
  document.body.classList.toggle('a2',lv==='a2');
  startGame();
}

let tTO;
function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(tTO);tTO=setTimeout(()=>t.classList.remove('show'),2000);
}

// missing element reference fix

startGame();
</script>
